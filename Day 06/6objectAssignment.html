<!-- Create an object employee with properties (emp id, emp name, dept, salary)
add new property as designation
create a function to display a welcome message with the name and designation mentioned. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object 2</title>
</head>
<body>
    <script>
        let employee = {
            emp_id: 1,
            emp_name: "Patrick",
            dept: "Human Resource",
            salary: 45000
        }
        employee.designation = "CEO"
        document.write("Hello " + employee.emp_name + ", " + employee.designation)
    </script>
</body>
</html>
