<!-- display a statement that shows :
Latest product added by the User : [name fo the project] -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototpe Example</title>
</head>
<body>
    <h2>Prototype</h2>
    <p1 id="output"></p1>

    <script>
        // constructor
        function Product(name) {
            this.name = name;
        }

        // adding method using prototype
        Product.prototype.sayHello = function() {
            return "Latest product added by the User : " + this.name;
        }

        // creating an object
        let p1 = new Product("Laptop");

        // display the output on webpage
        document.getElementById("output").innerHTML = p1.sayHello();
    </script>
</body>
</html>
