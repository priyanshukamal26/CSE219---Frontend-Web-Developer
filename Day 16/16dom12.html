<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>One</p>
    <p>Two</p>
    <p>Three</p>

    <button onclick="changeAll()">Click</button>

    <script>
        function changeAll() {
            let all = document.querySelectorAll("p");
            all[0].style.color = "red";
            all[1].style.color = "green";
            all[2].style.color = "blue";
        }
    </script>
</body>
</html>
