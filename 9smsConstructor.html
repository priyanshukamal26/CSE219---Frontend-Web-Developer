<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management System</title>
</head>
<body>
    <script>
        // class with default parameters
        class Student {
            constructor(name, age, course = "Computer Science")
            {
                this.name = name;
                this.age = age;
                this.course = course;
            }
            displayInfo()
            {
                console.log(`name: ${this.name}`);
                console.log(`age: ${this.age}`);
                console.log(`course: ${this.course}`);
            }
        }

        // arrow function with rest parameters
        const calculateAverage = (...marks) =>
        {
            const total = marks.reduce((sum, mark) => sum + mark, 0)
            return total/marks.length
        }

        //Promise function
        const getResult = (average) =>
        {
            return new Promise((resolve, reject) => 
            {
                setTimeout(() =>
                {
                    if(average > 40)
                        resolve(`Result : Pass with average ${average}`)
                    else
                        reject(`Result : Fail with average ${average}`)
                }, 2000)
            }
        )}

        // Async function
        const showResult = async (average) =>
        {
            try {
                const result = await getResult(average)
                console.log(result)
            }
            catch(error) { // error is an inbuilt keyword; required no defining/declaration
                console.log(error)
            }
        }

        const main = () => 
        {
            const student = new Student("ABC", 23) // object creation
            console.log("Student Details");
            student.displayInfo()

            // array
            let marks = [75, 80, 85]

            // destructuring
            let [m1, m2, m3] = marks
            
            console.log("\nMarks")
            console.log(`Marks 1 = ${m1}`)
            console.log(`Marks 2 = ${m2}`)
            console.log(`Marks 3 = ${m3}`)

            // spread Operator
            let updatedMarks = [...marks, 90]

            // calculate average using spread operator
            const average = calculateAverage(...updatedMarks)
            console.log(`Calculated Average : ${average}`)

            showResult(average)
        }

        main()
    </script>
</body>
</html>
