<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition 3</title>
    <style>
        .one {
            width: 100px;
            height: 100px;
            background: green;
            transition: width 0.5s, height 0.5s;
        }
        .one:hover {
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="one"></div>
</body>
</html>
