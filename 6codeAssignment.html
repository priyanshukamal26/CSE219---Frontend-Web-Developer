<!-- TASK

DESIGN A WEBPAGE OF A RESTAURANT WHERE :
1. Header should be present
2. Set image as bg and adjust its opacity
3. Create a slideshow of 5 images of top served dishes
4. Create 2 cards which includes images of dishes, customer can order - 
include ADD button, when user click on ADD - a para should display count of the items added -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Restaurant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("assets/food1.jpg");
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: -1;
        }

        header {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }

        .slideshow {
            width: 70%;
            height: 40%;
            margin: 30px auto;
            text-align: center;
        }

        .slideshow img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px;
        }

        .card {
            background-color: black;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            background-color: orange;
            color: black;
            font-weight: bold;
            border-radius: 5px;
        }

        #countText {
            color: black;
            text-align: center;
            font-size: 20px;
            margin-bottom: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        Welcome to Foodie's Hub
    </header>

    <div class="slideshow">
        <img id="slideImage" src="">
    </div>

    <div class="cards">

        <div class="card">
            <img src="assets/food1aa.jpg">
            <h3>Veg Burger</h3>
            <button onclick="addItem()">ADD</button>
        </div>

        <div class="card">
            <img src="assets/food1bb.jpg">
            <h3>Lemongrass Tofu</h3>
            <button onclick="addItem()">ADD</button>
        </div>

    </div>

    <p id="countText">Items added: 0</p>

    <script>
        let images = [
            "assets/food2.jpg",
            "assets/food3.jpg",
            "assets/food4.jpg",
            "assets/food5.jpg",
            "assets/food6.jpg"
        ];

        let index = 0;
        let slideImage = document.getElementById("slideImage");

        function showSlide() {
            slideImage.src = images[index];
            index = (index + 1) % images.length;
        }

        setInterval(showSlide, 2000);
        showSlide();

        let count = 0;
        let countText = document.getElementById("countText");

        function addItem() {
            count++;
            countText.innerText = "Items added: " + count;
        }
    </script>

</body>
</html>
