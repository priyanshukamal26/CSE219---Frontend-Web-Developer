<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpiceStation Restaurant</title>

<style>
/* ---------- GLOBAL STYLES ---------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* ---------- BACKGROUND WITH OPACITY ---------- */
body {
    position: relative;
    min-height: 100vh;
    text-align: center;
    color: #fff;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url("assets/6img1.jpg") no-repeat center/cover;
    opacity: 0.25;
    z-index: -1;
}

/* ---------- HEADER ---------- */
header {
    background: rgba(0,0,0,0.8);
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* ---------- SLIDESHOW ---------- */
.slideshow {
    width: 80%;
    max-width: 700px;
    margin: 30px auto;
    border-radius: 10px;
    overflow: hidden;
}

.slideshow img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* ---------- CARDS ---------- */
.card-container {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin: 40px 0;
}

.card {
    background: #fff;
    color: #000;
    width: 280px;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.card h3 {
    margin: 10px 0;
}

.card button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
}

.card button:hover {
    background: #e65c00;
}

/* ---------- ORDER COUNT ---------- */
#orderCount {
    font-size: 18px;
    margin-bottom: 40px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>Welcome to SpiceStation</header>

<!-- SLIDESHOW -->
<div class="slideshow">
    <img id="slide" src="https://www.shutterstock.com/image-photo/delicious-spiced-fish-curry-salmon-260nw-2494863119.jpg" alt="Top Dish">
</div>

<!-- CARDS -->
<div class="card-container">
    <div class="card">
        <img src="https://www.cubesnjuliennes.com/wp-content/uploads/2022/12/Tandoori-Chicken-Recipe.jpg" alt="Grilled Chicken">
        <h3>Grilled Chicken</h3>
        <button onclick="addItem()">ADD</button>
    </div>

    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQDh_JNeDTKKhAOCNbtwoCZBESHgSYicFb3xQ&s" alt="Veggie Pasta">
        <h3>Veggie Pasta</h3>
        <button onclick="addItem()">ADD</button>
    </div>
</div>

<p id="orderCount">Items added: 0</p>

<script>
/* ---------- SLIDESHOW SCRIPT ---------- */
const images = [
    "assets/6img2.jpg",
    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTekXkbTeN6GUCRq9a4Vow1izIzdMof-gAoUw&s",
    "assets/6img4.jpg",
    "assets/6img5.jpg",
    "assets/6img6.jpg"
];

let index = 0;
setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
}, 2000);

/* ---------- ORDER COUNT ---------- */
let count = 0;
function addItem() {
    count++;
    document.getElementById("orderCount").innerText =
        "Items added: " + count;
}
</script>

</body>
</html>
