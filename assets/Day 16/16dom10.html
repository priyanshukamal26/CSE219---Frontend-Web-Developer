<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>This is a para</p>
    <button onclick="changeTag()">Click</button>

    <script>
        function changeTag() {
            let p = document.getElementsByTagName("p")
            p[0].innerText = "Updated Paragraph";
        }
    </script>
</body>
</html>
