<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">
    <script src="test.js" defer></script>
    <style>
        * {
            margin: 0;
        }

        #output{
            display: block;
        }

        #container {
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }

        aside {
            background-color: thistle;
            padding: 15px;
            display: none;
            max-width: 250px;
        }

        aside a {
            display: block;
        }

        header {
            justify-content: space-around;
            grid-column: 1/3;
            display: flex;
        }

        header, footer {
            padding: 15px;
            align-items: center;
            background-color: darkgrey;
            color: white;
            grid-column: 1/3;
        }

        main {
            padding: 20px;
        }

    </style>
</head>
<body>
    <div id="container">
        <header>
            <h2>Welcome to the website</h2>
            <button id="toggleSidebar" onclick="toggleSidebar()">View Sidebar</button>
        </header>

        <aside id="sidebar">
            <h3>Menu</h3>
            <a href="#">Home</a>
            <a href="#">Contact</a>
        </aside>

        <main>
            <h1 id="output">Hello World!</h1>
            <button id="toggle" onclick="toggleView()">Toggle View</button>
            <button onclick="changeText()">Change Text</button>
            <button onclick="resetChanges()">Reset Changes</button>
        </main>

        
        <footer>Thank you!</footer>
    </div>
</body>
</html>
