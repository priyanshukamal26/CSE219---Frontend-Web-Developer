<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            background-color: powderblue;
            padding: 20px;
            text-align: center;
        }

        nav {
            padding: 5px;
            background-color: black;
            display: flex;
            gap: 15px;
            padding-left: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        .main {
            display: flex;

        }

        .sidebar {
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: left;
            padding: 20px;
            height: 100vh;
            width: 35%;
            background-color: rgb(181, 181, 136);
        }

        .container {
            height: 100vh;
            width: 65%;
            padding: 20px;
            background-color: rgb(139, 157, 157);
        }

        .boxcon {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            
        }

        .box {
            height: 120px;
            width: 200px;
            background-color: white;
        }

        .box1 {
            background: url(https://img.freepik.com/free-photo/gloomy-landscape_1398-1182.jpg?semt=ais_hybrid&w=740&q=80);
            background-size: cover;
        }

        .box2 {
            background: url(https://w0.peakpx.com/wallpaper/541/668/HD-wallpaper-real-breathtaking-beautiful-landscapes-ultra-canada-alberta-nature-beautiful-landscape-winter-turquoise-scenery-pebbles-shore-lake-cabin-mist-water-rocks-reflection-cottage-nationalpark.jpg);
            background-size: cover;
        }

        .box3 {
            background: url(https://www.shutterstock.com/image-photo/rural-area-on-autumn-equinox-600nw-2667975711.jpg);
            background-size: cover;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="main">
        <div class="sidebar">
            <h1>Sidebar</h1>
            <p>Menu Item 1</p>
            <p>Menu Item 2</p>
            <p>Menu Item 3</p>
        </div>

        <div class="container">
            <h2>Main Content</h2> <br>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Totam, aperiam.</p> <br>
            <div class="boxcon">
                <div class="box box1"></div>
                <div class="box box2"></div>
                <div class="box box3"></div>
            </div>
        </div>
    </div>
</body>
</html>
