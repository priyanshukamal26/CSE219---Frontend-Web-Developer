<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation 3</title>
    <style>
        body {
            margin: 0;
            height: 100%;
        }

        .second {
            width: 100px;
            height: 100px;
            background-color: orange;
            position: relative;
            animation: moveBox 3s infinite;
        }

        @keyframes moveBox {
            0% {
                left: 0px;
                top: 0px;
            }
            100% {
                left: 300px;
                top: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="second"></div>
</body>
</html>
