<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <style>
        body {
            margin: 0;
            background: whitesmoke;
        }

        .navbar {
            background-color: darkslateblue;
            content: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;   
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 200px;
            background: #141414;
            color: white;
            height: 100vh;
        }

        .sidebar ul{
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            padding: 15px;
            border-bottom: 1px solid gray;
        }

        .content {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: grey;
            width: 200px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }

        button {
            padding: 8px 12px;
            background: blue;
            color: white;
            border: none;
            margin-top: 10px;
        }

        .form-box {
            margin-top: 40px;
            background: white;
            padding: 20px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin-top: 10px;
        }

        .dark {
            background: #141414;
            color: white;
        }

        .dark .card {
            background: #4d4c4c;
        }

        .dark .form-box {
            background: #4d4c4c;
            
        }

        .dark .navbar {
            background: black;
            
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <h2>Student Dashboard</h2>
        <button onclick="toggleMode()">Dark Mode</button>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul>
                <li>Home</li>
                <li>Courses</li>
                <li>Assignment</li>
                <li>Profile</li>
            </ul>
        </aside>

        <!-- Main Content -->
         <main class="content">
            <h2>Welcome Student</h2>
            <div class="cards">
                <div class="card">
                    <img src="https://media.geeksforgeeks.org/wp-content/cdn-uploads/20221222184908/web-development1.png" alt="">
                    <h3>Front End Web Developer</h3>
                    <p>This is web development</p>
                    <button onclick="showCourse('Web Technologies')">View</button>
                </div>

                <div class="card">
                    <img src="https://happenings.lpu.in/wp-content/uploads/2024/05/Advanced-web-development.jpg" alt="">
                    <h3>Advanced Web Development</h3>
                    <p>This is Node JS</p>
                    <button onclick="showCourse('Node JS')">View</button>
                </div>

                <div class="card">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGOmMqGbQpWcyptGdOc8XRDuv2QWFiAhCJtA&s" alt="">
                    <h3>Java Programming</h3>
                    <p>This is Coding Language</p>
                    <button onclick="showCourse('JAVA')">View</button>
                </div>
            </div>

            <!-- Form -->
             <div class="form-box">
                <h3>Contact Teacher</h3>
                <input type="text" id="name" placeholder="Enter Name">
                <input type="text" id="msg" placeholder="Enter Message">
                <button onclick="sendMessage()">Send</button>
                <p id="result"></p>
             </div>
         </main>
    </div>

    <script>
        function showCourse(course) {
            alert("Opening Course : " + course);
        }

        function sendMessage() {
            let name = document.getElementById("name").value
            let msg = document.getElementById("msg").value
            document.getElementById("result").innerText =
            "Message sent by " + name + ": " + msg
        }

        function toggleMode() {
            document.body.classList.toggle("dark");
        }
    </script>
</body>
</html>
