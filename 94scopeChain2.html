<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scope Chain</title>
</head>
<body>
    <h1>Scope Chain</h1>
    <p id="one"></p>

    <script>
        // Global variable
        let name = "One Mall"
        function outerFunction() {

            let itemName = "Notebook" // Outer scope of function

            function innerFunction() {
                let itemPrice = 299 // Inner scope of function

                // scope chain
                document.getElementById("one").innerHTML =
                "Shop Name : " + name + "<br>" +
                "Item Name : " + itemName + "<br>" +
                "Item Price : " + itemPrice + "<br>"
                
                console.log(itemName)
                console.log(itemPrice)
            }
            innerFunction()
        }

        outerFunction()
    </script>
</body>
</html>
