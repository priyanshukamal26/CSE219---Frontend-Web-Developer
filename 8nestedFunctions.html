<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Functions</title>
</head>
<body>
    <script>
        function bankAccount(accountHolder) {
            var balance = 1000

            function deposit(amount) {
                balance = balance + amount;
                console.log(accountHolder + " deposited Rs. " + amount);
                console.log("New balance = Rs. ", balance);
            }

            function withdraw(amount) {
                balance = balance - amount;
                console.log(accountHolder + " withdrew Rs. " + amount);
                console.log("New balance = Rs. ", balance);
            }

            deposit(500)
            withdraw(800)
        }

        bankAccount("Mickey")
    </script>
</body>
</html>
