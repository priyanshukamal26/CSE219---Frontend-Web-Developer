<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Operator</title>
</head>
<body>
    <script>
        let arr1 = [20, 40];
        let arr2 = [...arr1, 30, 50];
        console.log(arr2);

        // Passing function to an array
        function sum(a, b, c) {
            return a+b+c;
        }
        let arr = [10, 20, 30];
        console.log("sum = " +sum(...arr));

        // TASK

        let arrta = [6, 3, 9];
        let arrtb = [8, 3];
        function squareSum(a, b, c) {
            return (a*a)+(b*b)+(c*c);
        }

        function cubeSum(a, b) {
            return (a*a*a)+(b*b*b);
        }

        console.log("Sum of squares of numbers = ", squareSum(...arrta));
        console.log("Sum of cubes of numbers = ", cubeSum(...arrtb));

    </script>
</body>
</html>
