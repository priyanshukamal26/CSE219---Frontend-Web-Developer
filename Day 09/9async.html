        // TASK
        // Display a welcome message to user if promise is resolved after 5s
        // (use async function)
        function getMessage() {
            return new Promise(resolve => {
                setTimeout(() => resolve("Welcome User!"), 5000)
            })
        }

        async function showMessage() {
            const res = await getMessage();
            console.log(res);
        }

        showMessage()
    </script>
