<!-- Prepare one empolyee salary management system, where classes and object should be used. 
Display the details of employees.
Stoe deatils of 4 different employyees
1. name
2. emp id
3. department
4. salary

calculate the total salaries of all employees.
If salary of 1 employee is upated, the total should also change. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Salary Management System</title>
</head>
<body>
    <script>

        // Employee Class
        class Employee {
            constructor(name, emp_id, department, salary) {
                this.name = name;
                this.emp_id = emp_id;
                this.department = department;
                this.salary = salary;
            }

            // Method to display employee details
            displayEmployee() {
                console.log(`Name       : ${this.name}`);
                console.log(`Employee ID: ${this.emp_id}`);
                console.log(`Department : ${this.department}`);
                console.log(`Salary     : ${this.salary}`);
            }

            // Method to update salary
            updateSalary(newSalary) {
                this.salary = newSalary;
            }
        }


        // Salary Management Class
        class SalaryManagement {
            constructor() {
                this.employees = [];
            }

            // Add employee
            addEmployee(employee) {
                this.employees.push(employee);
            }

            // Display all employees
            displayAllEmployees() {
                this.employees.forEach(emp => emp.displayEmployee());
            }

            // Calculate total salary
            calculateTotalSalary() {
                return this.employees.reduce((total, emp) => total + emp.salary, 0);
            }
        }


        // Main Function
        function main() {

            const emp1 = new Employee("Rahul", 101, "IT", 50000);
            const emp2 = new Employee("Priya", 102, "HR", 40000);
            const emp3 = new Employee("Amit", 103, "Finance", 45000);
            const emp4 = new Employee("Neha", 104, "Marketing", 42000);

            const management = new SalaryManagement();

            management.addEmployee(emp1);
            management.addEmployee(emp2);
            management.addEmployee(emp3);
            management.addEmployee(emp4);

            console.log("Employee Details - ");
            management.displayAllEmployees();

            console.log("Total Salary - ");
            console.log("Total Salary of All Employees: " + management.calculateTotalSalary());

            // Update salary of one employee
            console.log("\nUpdating Salary of Rahul...\n");
            emp1.updateSalary(60000);

            console.log("Updated Total Salary - ");
            console.log("Total Salary After Update: " + management.calculateTotalSalary());
        }

        main();

    </script>
</body>
</html>
