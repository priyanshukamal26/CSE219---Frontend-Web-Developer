<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scope Chain</title>
</head>
<body>
    <h1>Scope Chain</h1>
    <p id="one"></p>

    <script>
        // Global variable
        let university = "LPU"
        function outerFunction() {
            let course = "BTech CSE" // Outer scope of function

            function innerFunction() {
                let studentName = "ABC" // Inner scope of function

                // scope chain
                document.getElementById("one").innerHTML =
                "Student Name : " + studentName + "<br>" +
                "Course : " + course + "<br>" +
                "University : " + university
                
                console.log(studentName)
                console.log(course)
                console.log(university)
            }
            innerFunction()
        }

        outerFunction()
    </script>
</body>
</html>
