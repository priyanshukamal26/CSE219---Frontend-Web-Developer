<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <button onclick="showMarks()">Click</button>

    <script>
        function showMarks() {
            let marks = 94;
            let grade

            if(marks >= 90) {
                grade = "A";
            }
            else if(marks >= 75) {
                grade = "B"
            }
            else {
                grade = "C";
            }

            let result = "Grade is " + grade;
            console.log(result)
        }
    </script>
</body>
</html>
