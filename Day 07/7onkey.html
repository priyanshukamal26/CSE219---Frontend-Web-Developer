<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="keyInput" placeholder="Press a key">
    <p>Key Pressed: <span id="keyOutput"></span></p>

    <script>
        document.getElementById("keyInput").onkeypress = function(event) {
            document.getElementById("keyOutput").innerText = event.key;
        }
    </script>
</body>
</html>
